<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>好玩的猫咪</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      background-color: #201b2d;
    }

    ol,ul {
      list-style: none;
    }

    .box {
      position: relative;
      width: 1000px;
      margin: 100px auto;
      overflow: hidden;
      
    }

    .box::after,.box::before {
      position: absolute;
      left: 0;
      content: '';
      width: 100%;
      height: 100px;
      background-color: #201b2d;
      border-radius: 50%;

    }

    .box::before {
      top: -50px;
      color: #fff;
      content: '可爱的小猫咪，滚动鼠标滚轮可以查看哦~';
      text-align: center;
      line-height: 120px;
    }

    .box::after {
      bottom: -48px;
    }

    .box ul {
      display: flex;
      gap:15px;
      /*水平滚动条*/
      overflow-x: scroll;
      /*隐藏滚动条*/
      scrollbar-width: none;
      /*平滑滚动*/
      scroll-behavior: smooth;
    }

    /* 让谷歌或者苹果浏览器隐藏滚动条 */
    .box ul::-webkit-scrollbar {
      display: none;
    }

    .box ul li {
      flex: 0 0 200px;
    }

    .box ul li img {
      width: 100%;
    }
  </style>
</head>

<body>
  <div class="box">
    <ul>
      <li><a href="#"><img src="./assets/cat1.png" alt=""></a></li>
      <li><a href="#"><img src="./assets/cat2.png" alt=""></a></li>
      <li><a href="#"><img src="./assets/cat3.png" alt=""></a></li>
      <li><a href="#"><img src="./assets/cat4.png" alt=""></a></li>
      <li><a href="#"><img src="./assets/cat5.png" alt=""></a></li>
      <li><a href="#"><img src="./assets/cat6.png" alt=""></a></li>
      <li><a href="#"><img src="./assets/cat7.png" alt=""></a></li>
      <li><a href="#"><img src="./assets/cat8.png" alt=""></a></li>
      <li><a href="#"><img src="./assets/cat9.png" alt=""></a></li>
      <li><a href="#"><img src="./assets/cat10.png" alt=""></a></li>
      <li><a href="#"><img src="./assets/cat11.png" alt=""></a></li>
      <li><a href="#"><img src="./assets/cat12.png" alt=""></a></li>
      <li><a href="#"><img src="./assets/cat13.png" alt=""></a></li>
      <li><a href="#"><img src="./assets/cat14.png" alt=""></a></li>
      <li><a href="#"><img src="./assets/cat15.png" alt=""></a></li>
    </ul>
  </div>

  <script>
    // 获取可滚动的容器
    const scrollContainer = document.querySelector('.box ul');
    // 监听鼠标滚轮事件
    scrollContainer.addEventListener('wheel', (e) => {
      // 阻止默认的垂直滚动行为
      e.preventDefault();
      // 根据滚轮的垂直滚动量（deltaY）调整横向滚动量（scrollLeft）
      // 乘以系数（如 1.5）可调整滚动灵敏度
      scrollContainer.scrollLeft += e.deltaY * 1.5;
    });
  </script>
</body>

</html>
